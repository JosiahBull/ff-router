name: Checks

# Reusable suite of merge gates. Called by ci.yml (on push/PR) and by
# release.yml (on tag push) so a release runs — and depends on — the exact same
# checks as a PR, with no duplicated logic between the two workflows.
on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always

# The toolchain (nightly) and components come from rust-toolchain.toml, which
# rustup installs automatically on the first cargo invocation.
# macOS-only: the crate depends on AppKit via objc2.
jobs:
  test:
    name: Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features

  fmt:
    name: Rustfmt
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # Assert Cargo.toml and Info.plist declare the same version (and, on a tag,
  # that the tag matches). Pure text parsing, so no macOS runner / toolchain.
  versions:
    name: Versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: ./scripts/check-versions.sh
