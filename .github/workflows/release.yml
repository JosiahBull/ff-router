name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Run the full merge-gate suite (test, fmt, clippy, and the version check)
  # against the tag before building. Same reusable workflow CI runs, so there's
  # no release-only copy of any check — and on a tag the version check also
  # asserts the tag matches the declared version (see scripts/check-versions.sh).
  checks:
    uses: ./.github/workflows/checks.yml

  # Build both binaries for arm64 (Apple Silicon) only. macOS runner required:
  # ff-router links AppKit via objc2. macos-latest is itself arm64, so this is a
  # native build, not a cross-compile.
  build:
    name: Build macOS arm64 binaries
    needs: [checks]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: Swatinem/rust-cache@v2

      # ff-router is built with `build-std` (needs rust-src). The toolchain
      # (nightly) itself comes from rust-toolchain.toml.
      - name: Provision toolchain components and target
        run: |
          rustup component add rust-src
          rustup target add aarch64-apple-darwin

      # scripts/build.sh applies the size-optimised build-std flags for the
      # TARGET we pass, so the released binary matches a local build exactly.
      - name: Build ff-router (size-optimised, arm64)
        run: |
          TARGET=aarch64-apple-darwin scripts/build.sh
          mkdir -p dist
          cp target/aarch64-apple-darwin/release/ff-router dist/ff-router
          file dist/ff-router

      - name: Build ff-router-installer (arm64)
        run: |
          cargo build -p ff-router-installer --release --target aarch64-apple-darwin
          cp target/aarch64-apple-darwin/release/ff-router-installer dist/ff-router-installer
          file dist/ff-router-installer

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: binaries
          path: |
            dist/ff-router
            dist/ff-router-installer
          if-no-files-found: error

  # Sequenced after the build so the release page never advertises a tag whose
  # binaries failed to build. Asset names must stay `ff-router` and
  # `ff-router-installer` — scripts/install.sh and the installer download them
  # by those exact names.
  github-release:
    name: Create GitHub release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          # --generate-notes walks back to the previous release tag.
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          name: binaries
          path: dist

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag \
            dist/ff-router dist/ff-router-installer
